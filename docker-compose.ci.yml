version: '3.9'

# CI/CD stack: Jenkins (Docker-in-Docker) + MinIO for artifacts
# Usage:
#  1) docker compose -f docker-compose.ci.yml up -d --build
#  2) Jenkins: http://localhost:8080 (first run prints admin password in logs)
#  3) MinIO Console: http://localhost:9001 (user/pass below)
#
# Notes:
#  - Jenkins talks to the "dind" service via DOCKER_HOST to run build containers
#  - MinIO stores build artifacts

services:
  jenkins:
    build:
      context: .
      dockerfile: devops/jenkins/Dockerfile
    container_name: jenkins
    ports:
      - '8080:8080'
      - '50000:50000'
    environment:
      - JENKINS_OPTS=--prefix=/
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - DOCKER_HOST=tcp://dind:2375
      - DOCKER_TLS_CERTDIR=
      # Expose MinIO endpoint to pipelines (override as needed)
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_BUCKET_ARTIFACTS=android-artifacts
      - MINIO_ACCESS_KEY=miniouser
      - MINIO_SECRET_KEY=miniosecret
      # API endpoint for webhook callbacks
      - API_ENDPOINT=http://host.docker.internal:3000/api/v1/app-builder
    volumes:
      - jenkins_home:/var/jenkins_home
    depends_on:
      - dind
      - minio
    networks:
      - ci-net

  dind:
    image: docker:27-dind
    container_name: dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - dind_data:/var/lib/docker
    networks:
      - ci-net

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=miniouser
      - MINIO_ROOT_PASSWORD=miniosecret
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web Console
    volumes:
      - minio_data:/data
    networks:
      - ci-net

  minio-init:
    image: minio/mc:RELEASE.2024-11-13T22-32-04Z
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >-
      /bin/sh -c '
        set -euo pipefail; \
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do echo "Waiting for MinIO..."; sleep 2; done; \
        mc mb -p local/android-artifacts || true; \
        mc anonymous set download local/android-artifacts || true; \
        echo "MinIO initialized"; \
        tail -f /dev/null'
    environment:
      - MINIO_ROOT_USER=miniouser
      - MINIO_ROOT_PASSWORD=miniosecret
    networks:
      - ci-net

networks:
  ci-net:
    name: ci-net

volumes:
  jenkins_home:
  dind_data:
  minio_data:
