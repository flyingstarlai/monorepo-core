version: '3.8'

services:
  # API Service
  api:
    image: ${API_IMAGE:-twsbpmac/acm-api}:${TAG:-latest}
    container_name: acm-api
    pull_policy: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-1433}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=traefik-proxy'
      - 'traefik.http.routers.acm-api.priority=100'
      - 'traefik.http.routers.acm-api.rule=Host(`acm-api.twsbp.com`)'
      - 'traefik.http.routers.acm-api.entrypoints=web'
      - 'traefik.http.services.acm-api.loadbalancer.server.port=3000'
    networks:
      - traefik-proxy
      - acm-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web Service
  web:
    image: ${WEB_IMAGE:-twsbpmac/acm}:${TAG:-latest}
    container_name: acm-web
    pull_policy: always
    environment:
      - VITE_API_URL=http://acm-api.twsbp.com
      - VITE_APP_NAME=Account Manager
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=traefik-proxy'
      - 'traefik.http.routers.acm-web.priority=90'
      - 'traefik.http.routers.acm-web.rule=Host(`acm.twsbp.com`)'
      - 'traefik.http.routers.acm-web.entrypoints=web'
      - 'traefik.http.services.acm-web.loadbalancer.server.port=80'
    networks:
      - traefik-proxy
      - acm-network
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  acm-network:
    driver: bridge
    name: acm-prod-network
    ipam:
      config:
        - subnet: 172.21.0.0/16
  traefik-proxy:
    external: true
